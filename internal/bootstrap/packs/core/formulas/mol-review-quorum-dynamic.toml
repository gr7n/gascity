description = """
Lane-driven review quorum workflow.

This graph.v2 workflow validates a user-supplied lane config, fans out one
inline retry-wrapped reviewer lane per config item, and writes the canonical
review-quorum.summary.v1 output with the code-owned internal/reviewquorum
finalizer.
"""
formula = "mol-review-quorum-dynamic"
version = 2
contract = "graph.v2"

[vars]
[vars.subject]
description = "The bead, PR, commit range, or artifact being reviewed"
required = true

[vars.base_ref]
description = "Optional baseline ref used by reviewer prompts when inspecting a diff"
default = "origin/main"

[vars.lanes_json]
description = "JSON array of lane specs with id, provider, model, target, and optional focus"
required = true

[[steps]]
id = "plan-review-lanes"
title = "Plan review lanes"
description = """
Validate the user-supplied lane configuration for `{{subject}}` and write
`{"lanes":[...]}` to `gc.output_json`.
"""
metadata = { "gc.kind" = "review-quorum-plan", "gc.review_quorum_lanes_json" = "{{lanes_json}}", "gc.output_json_schema" = "review-quorum.lanes.v1", "gc.output_json_required" = "true" }

[steps.on_complete]
for_each = "output.lanes"
parallel = true

[[steps.on_complete.template]]
id = "{target}.review-{item.id}"
title = "Review lane {item.id}"
description = """
Run a read-only review of `{{subject}}` as durable lane `{item.id}` using
provider `{item.provider}` and model target `{item.model}`. Use `{{base_ref}}`
as the diff baseline when inspecting changes. Focus: `{item.focus}`.

Do not modify user files, branches, comments, external systems, or unrelated
beads. Before reviewing, record a mutation baseline with
`git status --porcelain=v1 -z`. After reviewing, run the same command and report
only the delta introduced after your baseline. Pre-existing dirty state and
pre-existing untracked files are not reviewer-created mutations.

Write durable JSON to `gc.output_json` with these keys:

- `lane_id`: `{item.id}`
- `provider`: `{item.provider}`
- `model`: `{item.model}`
- `verdict`: one of `pass`, `pass_with_findings`, `fail`, or `blocked`
- `summary`: concise review summary
- `findings_count`: integer count of findings
- `findings`: array of findings with severity, title, body, file, line or range
- `evidence`: commands, files, diffs, or artifacts inspected
- `usage`: model/runtime usage if available, otherwise null
- `read_only_enforcement`: `observed`, `enabled`, `passed`,
  `baseline_command`, `after_command`, and optional notes
- `mutations_delta`: files or state changes created after the baseline; empty if none
- `failure_class`: `none`, `transient`, or `hard`
- `failure_reason`: stable reason string or empty

On success, close with `gc.outcome=pass`. For retryable provider or transport
failures, close with `gc.outcome=fail`, `gc.failure_class=transient`, and a
stable `gc.failure_reason`. For non-retryable input or contract failures, use
`gc.failure_class=hard`.
"""
metadata = { "gc.run_target" = "{item.target}", "gc.provider" = "{item.provider}", "gc.model" = "{item.model}", "gc.review_quorum_lane" = "{item.id}", "gc.review_quorum_focus" = "{item.focus}", "gc.reviewer_model" = "{item.model}", "gc.output_json_schema" = "review-quorum.lane.v1", "gc.output_json_required" = "true" }

[steps.on_complete.template.retry]
max_attempts = 3
on_exhausted = "soft_fail"

[[steps]]
id = "finalize-review-quorum"
title = "Finalize review quorum"
needs = ["plan-review-lanes"]
waits_for = "all-children"
description = """
Wait for every planned reviewer lane to close or soft-fail, then write the
canonical `review-quorum.summary.v1` output with `internal/reviewquorum.Finalize`.
"""
metadata = { "gc.kind" = "review-quorum-finalize", "gc.review_quorum_role" = "synthesis", "gc.review_quorum_subject" = "{{subject}}", "gc.review_quorum_base_ref" = "{{base_ref}}", "gc.review_quorum_lanes_source" = "plan-review-lanes", "gc.output_json_schema" = "review-quorum.summary.v1", "gc.output_json_required" = "true" }
