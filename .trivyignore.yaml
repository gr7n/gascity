vulnerabilities:
  # Expiry horizon bulk-extended 2026-07-06: 2026-07-07 -> 2026-08-07. Re-audit
  # rechecked after moving Dolt from v2.1.7 to v2.1.10. The new binary clears
  # four older findings, but still embeds Go 1.26.2, x/net v0.54.0,
  # x/crypto v0.51.0, and thrift v0.13.1. The image-specific bd rebuild and gc
  # now use Go 1.26.4, x/net v0.55.0, and x/crypto v0.52.0 and therefore carry
  # no waivers here. The remaining entries are limited to br, Dolt, or kubectl;
  # drop each one when its upstream binary rebuilds.
  #
  # Go stdlib CVEs disclosed 2026-05-12. Fixed in Go 1.25.10 / 1.26.3 for
  # the first batch (33811–42499); Go 1.26.4 / 1.25.11 for CVE-2026-42504.
  # As of 2026-06-15: cli/cli v2.94.0 ships Go 1.26.4 (clears all entries);
  # gh is installed unpinned via apt so a base-image rebuild picks it up
  # automatically. dolthub/dolt v2.1.10 still uses Go 1.26.2 (pending
  # upstream). gc builds against Go 1.26.4 (go.mod, via PR #3297).
  # Durable full fix tracked in ga-frh27v; remove dolt entries once upstream
  # ships a Go 1.26.4+ build.
  - id: CVE-2026-33811
    paths:
      - "usr/local/bin/br"
      - "usr/local/bin/dolt"
      - "usr/local/bin/kubectl"
    expired_at: 2026-08-07
    statement: Upstream br, dolt, and kubectl embed Go 1.26.2 stdlib; remove once each rebuilds against 1.26.3+ (or 1.25.10+). bd and gc are rebuilt with Go 1.26.4.
